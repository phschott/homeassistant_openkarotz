- id: maj_options_voix_tts
  alias: MAJ options voix TTS depuis l'API
  description: ''
  triggers:
  - event: start
    trigger: homeassistant
  - hours: /6
    trigger: time_pattern
  conditions: []
  actions:
  - variables:
      voices: '{{ state_attr(''sensor.karotz_voice_list'',''voices'') | default([],
        true) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ voices | count > 0 }}'
      sequence:
      - target:
          entity_id: input_select.karotz_voice
        data:
          options: >
              {% set voices = state_attr('sensor.karotz_voice_list','voices') | default([], true) %}
              [
                {% for v in voices %}
                  "{{ v.id ~ ' - ' ~ v.lang }}"{% if not loop.last %},{% endif %}
                {% endfor %}
              ]
        action: input_select.set_options
  - target:
      entity_id: input_select.karotz_voice
    action: input_select.select_first
- id: maj_options_moods_tts
  alias: MAJ options Moods TTS depuis l'API
  description: ''
  triggers:
  - event: start
    trigger: homeassistant
  - hours: /6
    trigger: time_pattern
  conditions: []
  actions:
  - variables:
      moods: '{{ state_attr(''sensor.karotz_moods_list'',''moods'') | default([],
        true) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ moods | count > 0 }}'
      sequence:
      - target:
          entity_id: input_select.karotz_mood
        data:
          options: >
              {% set moods = state_attr('sensor.karotz_moods_list','moods') | default([], true) %}
              [
                {% for m in moods %}
                  "{{ m.id ~ ' - ' ~ (m.text
                                      | replace('&acirc;', 'â')
                                      | replace('&eacute;', 'é')
                                      | replace('&egrave;', 'è')
                                      | replace('&ccedil;', 'ç')
                                      | replace('&Ccedil;', 'Ç')
                                      | replace('&Ecirc;', 'Ê')
                                      | replace('&Eacute;', 'É')
                                      | replace('&agrave;', 'à')
                                      | replace('&ecirc;', 'ê')
                                      | replace('&icirc;', 'î')
                                      | replace('&ucirc;', 'û')
                                      | replace('&ugrave;', 'ù')
                                      | replace('&oelig;', 'œ')
                                      | replace('&ocirc;', 'ô')
                                      | replace('&hellip;', '...')
                                      | replace('&apos;', '\'')
                                      | replace('&rsquo;', '\'')
                                      ) }}"
                  {% if not loop.last %},{% endif %}
                {% endfor %}
              ]
        action: input_select.set_options
  - target:
      entity_id: input_select.karotz_mood
    action: input_select.select_first
