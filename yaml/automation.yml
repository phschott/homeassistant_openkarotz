- id: '1769903041530'
  alias: Motion Sensor Issy
  description: Motion detection in Issy
  triggers:
  - trigger: webhook
    allowed_methods:
    - POST
    - PUT
    local_only: false
    webhook_id: MotionDetectionIssy
  conditions:
  - condition: state
    entity_id: switch.picam_issy_detection_de_mouvement_2
    state:
    - 'on'
  actions:
  - action: notify.envoi_mail
    metadata: {}
    data:
      message: Home Assistant a détecter des mouvement à Issy
      title: Home Assistant - Alerte Mouvement à Issy
      target: ph@schott.io
  - action: notify.persistent_notification
    metadata: {}
    data:
      message: La caméra à détecter des mouvements à Issy. Vérifier les vidéos de
        sécurité!!
      title: Détection de mouvements à Issy
  mode: single
