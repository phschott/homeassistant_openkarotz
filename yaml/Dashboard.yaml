title: Karotz Dashboard
views:
  - title: Apparence
    path: karotz
    icon: ''
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Couleur
            heading_style: title
          - type: entities
            entities:
              - entity: input_text.karotz_led_color
                name: Couleur LED (hex)
              - entity: input_text.karotz_led_color2
                name: Couleur LED (hex)
          - type: tile
            entity: input_number.karotz_pulse_speed
            name: Vitesse Pulse
            features:
              - type: numeric-input
                style: slider
          - type: button
            name: LED On
            icon: mdi:lightbulb
            tap_action:
              action: call-service
              service: rest_command.karotz_led_fixed
              data:
                color: '{{ states(''input_text.karotz_led_color'') }}'
          - type: button
            name: LED Off
            icon: mdi:lightbulb-off
            tap_action:
              action: call-service
              service: rest_command.karotz_led_off
          - type: button
            name: LED Pulse
            icon: mdi:brightness-auto
            tap_action:
              action: call-service
              service: rest_command.karotz_led_pulse
              data:
                color: '{{ states(''input_text.karotz_led_color'') }}'
                color2: '{{ states(''input_text.karotz_led_color2'') }}'
                speed: '{{ states(''input_number.karotz_pulse_speed'') }}'
      - type: grid
        cards:
          - type: heading
            heading: Voix Karotz
            heading_style: title
          - type: entities
            entities:
              - entity: input_select.karotz_voice
                name: Voix
              - entity: input_text.karotz_text_message
              - entity: input_select.karotz_mood
                name: Mood
              - type: button
                name: Parler
                icon: mdi:account-voice
                tap_action:
                  action: call-service
                  service: rest_command.karotz_tts
                  data:
                    message: Test de la voix sélectionnée
                    voice: '{{ states(''input_select.karotz_voice'').split('' - '')[0] }}'
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:clock
            tap_action:
              action: perform-action
              perform_action: rest_command.karotz_play_clock
              target: {}
            hold_action:
              action: none
            name: Clock
          - show_name: true
            show_icon: true
            type: button
            name: Mood Random
            tap_action:
              action: perform-action
              perform_action: rest_command.karotz_play_random_mood
              target: {}
            icon: mdi:emoticon-outline
          - show_name: true
            show_icon: true
            type: button
            name: Mood
            tap_action:
              action: perform-action
              perform_action: rest_command.karotz_play_mood
              data:
                id: '{{ states(''input_select.karotz_mood'').split('' - '')[0] }}'
            icon: mdi:emoticon-outline
      - type: grid
        cards:
          - type: heading
            heading: Oreilles
            heading_style: title
          - type: tile
            entity: input_number.karotz_ear_left
            name: Oreille gauche
            features:
              - type: numeric-input
                style: slider
          - type: tile
            entity: input_number.karotz_ear_right
            name: Oreille droite
            features:
              - type: numeric-input
                style: slider
          - show_name: true
            show_icon: true
            type: button
            name: Bouger oreilles
            icon: mdi:rabbit-variant
            tap_action:
              action: call-service
              service: rest_command.karotz_ears_move
          - show_name: true
            show_icon: true
            type: button
            name: Oreilles aléatoires
            icon: mdi:rabbit-variant-outline
            tap_action:
              action: call-service
              service: rest_command.karotz_ears_random
          - type: button
            name: Oreilles reset
            icon: mdi:restore
            tap_action:
              action: call-service
              service: rest_command.karotz_ears_reset
    visible:
      - user: e43b517406b74539b8cd655f937af723
    header: {}
    max_columns: 4
    cards: []
  - type: sections
    max_columns: 4
    title: Photos
    path: photo
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Photos & Webcam
            heading_style: title
          - show_name: true
            show_icon: true
            type: button
            name: Prendre photo
            icon: mdi:camera
            tap_action:
              action: call-service
              service: rest_command.karotz_snapshot
          - type: button
            name: Effacer snapshots
            icon: mdi:trash-can
            tap_action:
              action: call-service
              service: rest_command.karotz_clear_snapshots
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:cctv
            tap_action:
              action: url
              url_path: http://karotz.schott.io:8080/cgi-bin/webcam?silent=1
            name: Webcam
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:panorama
            tap_action:
              action: url
              url_path: http://karotz.schott.io:8080/snapshots.html
            name: Snapshots
            entity: sensor.karotz_snapshot_list
            show_state: true
    cards: []
  - type: sections
    max_columns: 4
    title: Radio
    path: radios
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Liste des radios
            heading_style: title
          - type: picture
            grid_options:
              rows: 4
              columns: 6
            tap_action:
              action: call-service
              service: script.api_radio_script
              data:
                param: http://icecast.skyrock.net/s/natio_mp3_64k
            image:
              media_content_id: >-
                https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgO6Df6ClBQFb_yNW_cwVVgpbnkjDYJxcYmC8n8yRY9kcAqCIwFSKdvoilZ3SQ8ggMeZ0kbmIiN93Dj0ojZXm503X2rXXB9V_v1V77pyiuUaT-tUZsK56oEXj_SSDkPlMvI-724Hp9mpU8/s400/Skyrock+%253B+%2528001%2529.jpg
              media_content_type: ''
              metadata:
                navigateIds:
                  - {}
                  - media_content_type: ''
                    media_content_id: __MANUAL_ENTRY__
          - type: picture
            image:
              media_content_id: >-
                https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj4dR-c6_HhvB6sIdaXn7JUBwNkylv431eu5SK38Aji3Gysd1mLx4XJfPslA0YRr4sZUwlUtw5-4vc4MMw1nkpeROc1F-N5VYQRWVS3ix1F5ItWlX_iGixJQXe1DOX0na00knCKT_suNbE/s1600/NRJ+Belgique.png
              media_content_type: ''
              metadata:
                navigateIds:
                  - {}
                  - media_content_type: ''
                    media_content_id: __MANUAL_ENTRY__
            grid_options:
              rows: 4
              columns: 6
            tap_action:
              action: call-service
              service: script.api_radio_script
              data:
                param: http://streaming.nrjaudio.fm/oumvmk8fnozc?origine=fluxradios
      - type: grid
        cards:
          - type: heading
            heading: Contrôles
            heading_style: title
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:pause
            tap_action:
              action: call-service
              service: rest_command.karotz_pause_radio
            name: Pause
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:stop
            tap_action:
              action: call-service
              service: rest_command.karotz_quit_radio
            name: Stop
    cards: []
  - type: sections
    max_columns: 4
    title: 'État '
    path: etat
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Status
            heading_style: title
          - type: tile
            entity: sensor.karotz_version
            vertical: false
            features_position: bottom
            grid_options:
              columns: 12
              rows: 1
          - type: gauge
            entity: sensor.karotz_used_space
          - show_name: true
            show_icon: true
            type: button
            tap_action:
              action: perform-action
              perform_action: rest_command.karotz_reboot
              target: {}
            icon: mdi:restore
            name: Reboot
          - show_name: true
            show_icon: true
            type: button
            tap_action:
              action: perform-action
              perform_action: rest_command.karotz_synctime
              target: {}
            icon: mdi:calendar-sync
            name: Sync Time
          - show_name: true
            show_icon: true
            type: button
            tap_action:
              action: perform-action
              perform_action: rest_command.karotz_wakeup_silent
              target: {}
            icon: mdi:weather-sunset-up
            name: Wakeup
          - show_name: true
            show_icon: true
            type: button
            tap_action:
              action: perform-action
              perform_action: rest_command.karotz_sleep
              target: {}
            icon: mdi:power-sleep
            name: Sleep
          - type: distribution
            entities:
              - sensor.karotz_snapshot_list
              - sensor.karotz_version
              - sensor.karotz_used_space
