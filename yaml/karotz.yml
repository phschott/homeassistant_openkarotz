input_text:
  karotz_led_color:
    name: Couleur LED
    initial: "00FF00"  # vert par défaut
  karotz_led_color2:
    name: Couleur LED 2
    initial: "000000"  # noir par défaut
  karotz_text_message:
    name: Message
    initial: "Bonjour"
  karotz_ip:
    name: IP Karotz
    initial: "192.168.1.170"
    
input_number:
  karotz_pulse_speed:
    name: Frequence
    min: 0
    max: 2000
    initial: 700
    step: 1
  karotz_ear_left:
    name: Position Oreille Gauche
    initial: 0
    min: 0
    max: 16
    step: 1
  karotz_ear_right:
    name: Position Oreille Droite
    initial: 0
    min: 0
    max: 16
    step: 1

input_select:
  karotz_voice:
    name: Voix Karotz
    options:
      - "1 - French Male"
      - "2 - French Female"
    initial: "1 - French Male"
  
  karotz_mood:
    name: Karotz Mood
    options:
      - "1 - Ronflements"
      - "2 - Bâillement"
    initial: "1 - Ronflements"

rest:
  - resource: "http://192.168.1.170/cgi-bin/status"
    scan_interval: 14400
    sensor:
      - name: "Karotz used space"
        value_template: "{{ value_json.karotz_percent_used_space }}"
        unit_of_measurement: "%"
    
      - name: "Karotz version"
        value_template: "{{ value_json.version }}"
    
      - name: "Karotz Led Color Raw"
        value_template: "{{ value_json.led_color }}"
    
      - name: "Karotz Led pulse Raw"
        value_template: "{{ value_json.led_pulse }}"
        
      - name: "Karotz WLan Mac"
        value_template: "{{ value_json.wlan_mac }}"
        
      - name: "Karotz Nb Tags"
        value_template: "{{ value_json.nb_tags }}"
        
      - name: "Karotz Nb Stories"
        value_template: "{{ value_json.nb_stories }}"
        
      - name: "Karotz Nb Sounds"
        value_template: "{{ value_json.nb_sounds }}"
        
      - name: "Karotz Nb Moods"
        value_template: "{{ value_json.nb_moods }}"
        
  - resource: "http://192.168.1.170/cgi-bin/voice_list"
    sensor:
      - name: "Karotz Voice List"
        value_template: "OK"
        json_attributes:
        - voices
        
  - resource: "http://192.168.1.170/cgi-bin/snapshot_list"
    sensor:
      - name: "Karotz Snapshot List"
        value_template: "{{ value_json.snapshots | count }}"
        json_attributes:
        - snapshots
        
  - resource: "http://192.168.1.170/cgi-bin/moods_list"
    sensor:
      - name: "Karotz Moods List"
        value_template: "OK"
        json_attributes:
        - moods
       
rest_command:
  # =====================
  # STATUS / POWER
  # =====================
  karotz_reboot:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/reboot"
    
  karotz_synctime:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/setclock"
  
  karotz_wakeup:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/wakeup"

  karotz_wakeup_silent:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/wakeup?silent=1"

  karotz_sleep:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/sleep"

  # =====================
  # LEDS
  # =====================
  karotz_led_fixed:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/leds?color={{ states('input_text.karotz_led_color') }}"

  karotz_led_off:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/leds?color=000000"

  karotz_led_pulse:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/leds?pulse=1&color={{ states('input_text.karotz_led_color') }}&speed={{ states('input_number.karotz_pulse_speed') }}&color2={{ states('input_text.karotz_led_color2') }}"

  # =====================
  # EARS
  # =====================
  karotz_ears_enable:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/ears_mode?disable=0"

  karotz_ears_move:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/ears?left={{ states('input_number.karotz_ear_left') | int }}&right={{ states('input_number.karotz_ear_right') | int }}&noreset=1"

  karotz_ears_reset:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/ears_reset"

  karotz_ears_random:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/ears_random"

  # =====================
  # VOICE / TTS
  # =====================
  karotz_tts:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/tts?voice={{ states('input_select.karotz_voice').split('-')[0] | trim }}&text={{ states('input_text.karotz_text_message') | urlencode }}&nocache=0"

  # =====================
  # SNAPSHOT / WEBCAM
  # =====================
  karotz_snapshot:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/snapshot?silent=1"
    method: GET
    timeout: 15
    content_type: "text/plain"
    verify_ssl: false
    insecure_cipher: true
    skip_url_encoding: true
    
  karotz_webcam:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/webcam?silent=1"
    
  karotz_snapshot_get:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/snapshot_get?filename={{ snapshotFilename }}"
    method: GET
    content_type: "image/jpeg"

  karotz_clear_snapshots:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/clear_snapshots"

  # =====================
  # APPS / MOODS / RADIO
  # =====================
  karotz_play_mood:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/apps/moods?id={{ states('input_select.karotz_mood').split('-')[0] }}"
    timeout: 20

  karotz_play_random_mood:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/apps/moods"
    timeout: 20

  karotz_play_clock:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/apps/clock"

  karotz_play_radio:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/sound?url={{ karotzStreamUrl | urlencode }}"

  karotz_pause_radio:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/sound_control?cmd=pause"
  
  karotz_quit_radio:
    url: "http://{{ states('input_text.karotz_ip') }}/cgi-bin/sound_control?cmd=quit"